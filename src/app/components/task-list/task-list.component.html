<div class="dashboard-container">
  <header class="dashboard-header">
    <h2>Gestor de Tareas</h2>
    <span class="badge">Go + Angular</span>
  </header>

  <div class="card form-card">
    <div class="input-group">
      <input
        type="text"
        [(ngModel)]="newTask.name"
        placeholder="¿Qué necesitas hacer?"
        class="custom-input"
      />

      <input
        type="text"
        [(ngModel)]="newTask.content"
        placeholder="Detalles de la tarea..."
        class="custom-input flex-2"
      />

      <div class="button-group">
        <button (click)="saveTask()" class="btn btn-primary" [class.btn-success]="isEditing">
          {{ isEditing ? 'Actualizar' : 'Agregar' }}
        </button>

        <button *ngIf="isEditing" (click)="resetForm()" class="btn btn-secondary">Cancelar</button>
      </div>
    </div>
  </div>

  <div class="card list-card">
    <ul class="task-list">
      <li *ngFor="let task of tasks" class="task-item">
        <div class="task-content">
          <h4 class="task-title">{{ task.name }}</h4>
          <p class="task-desc">{{ task.content }}</p>
        </div>

        <div class="task-actions">
          <button (click)="editTask(task)" class="btn btn-icon btn-warning">Editar</button>
          <button (click)="deleteTask(task.id)" class="btn btn-icon btn-danger">Eliminar</button>
        </div>
      </li>
    </ul>

    <div *ngIf="tasks.length === 0" class="empty-state">
      <div class="empty-icon">📂</div>
      <p>No hay tareas pendientes en la base de datos.</p>
    </div>
  </div>
</div>
